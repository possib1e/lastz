<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">积分商城任务奖励示意图</title>
  <desc id="desc">积分商城获取积分弹窗，展示可领取、未完成、已领取按钮。</desc>
  <defs><linearGradient id="modal" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#ffc02f"/><stop offset="1" stop-color="#ffe49a"/></linearGradient><filter id="shadow" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#4b3718" flood-opacity=".28"/></filter></defs>
  <rect width="900" height="620" fill="#173a5c"/>
  <rect y="0" width="900" height="620" fill="#000" opacity=".34"/>
  <rect x="120" y="88" width="660" height="430" rx="14" fill="url(#modal)" filter="url(#shadow)"/>
  <text x="450" y="130" text-anchor="middle" fill="#fff" font-size="32" font-weight="900" font-family="Arial,'Microsoft YaHei'">任务奖励</text>
  <text x="738" y="128" text-anchor="middle" fill="#fff" font-size="32" font-weight="900" font-family="Arial">×</text>
  <g font-family="Arial,'Microsoft YaHei'" font-weight="900">
    <g transform="translate(145 150)">
      <rect width="610" height="70" fill="#fff4ca"/>
      <circle cx="35" cy="35" r="18" fill="#c99422"/><text x="35" y="43" text-anchor="middle" fill="#fff" font-size="19">Z</text>
      <text x="85" y="43" font-size="21">登入 Last Z 官方金砖网站</text>
      <rect x="500" y="14" width="86" height="42" fill="#ff7b1a"/><text x="543" y="42" text-anchor="middle" fill="#fff" font-size="20">可领取</text>
    </g>
    <g transform="translate(145 226)">
      <rect width="610" height="70" fill="#fff4ca"/>
      <circle cx="35" cy="35" r="18" fill="#c99422"/><text x="35" y="43" text-anchor="middle" fill="#fff" font-size="19">Z</text>
      <text x="85" y="43" font-size="21">每日购买任意礼包或金砖达到 1000</text>
      <rect x="500" y="14" width="86" height="42" fill="#999"/><text x="543" y="42" text-anchor="middle" fill="#fff" font-size="20">未完成</text>
    </g>
    <g transform="translate(145 302)">
      <rect width="610" height="70" fill="#fff4ca"/>
      <circle cx="35" cy="35" r="18" fill="#c99422"/><text x="35" y="43" text-anchor="middle" fill="#fff" font-size="19">Z</text>
      <text x="85" y="43" font-size="21">浏览会员中心页面</text>
      <rect x="500" y="14" width="86" height="42" fill="#ff7b1a"/><text x="543" y="42" text-anchor="middle" fill="#fff" font-size="20">可领取</text>
    </g>
    <g transform="translate(145 378)">
      <rect width="610" height="70" fill="#fff4ca"/>
      <circle cx="35" cy="35" r="18" fill="#c99422"/><text x="35" y="43" text-anchor="middle" fill="#fff" font-size="19">Z</text>
      <text x="85" y="43" font-size="21">浏览积分商城页面</text>
      <rect x="500" y="14" width="86" height="42" fill="#ff7b1a"/><text x="543" y="42" text-anchor="middle" fill="#fff" font-size="20">可领取</text>
    </g>
  </g>
  <ellipse cx="690" cy="300" rx="80" ry="205" fill="none" stroke="#ef4b4b" stroke-width="5"/>
  <text x="450" y="484" text-anchor="middle" fill="#ef4b4b" font-size="20" font-weight="900" font-family="Arial,'Microsoft YaHei'">每日任务将于末世时间 0 点刷新，免费任务优先领完</text>
</svg>
