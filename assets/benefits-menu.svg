<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">官网左侧菜单入口示意图</title>
  <desc id="desc">Last Z 官方福利页菜单，标出七日签到、会员中心、积分商城三个入口。</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1"><stop stop-color="#f8d27a"/><stop offset="1" stop-color="#b87320"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#0c4a7d"/><stop offset="1" stop-color="#071b35"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#4b3718" flood-opacity=".25"/></filter>
  </defs>
  <rect width="1200" height="560" fill="#f6f2e8"/>
  <rect width="1200" height="72" fill="#20242a"/>
  <rect x="24" y="24" width="42" height="6" rx="3" fill="#fff"/><rect x="24" y="38" width="42" height="6" rx="3" fill="#fff"/><rect x="24" y="52" width="42" height="6" rx="3" fill="#fff"/>
  <text x="88" y="48" fill="#fff" font-size="28" font-family="Arial Black,Arial" font-weight="900">LAST Z</text>
  <rect x="740" y="18" width="120" height="36" rx="8" fill="#3156d8"/><text x="790" y="43" text-anchor="middle" fill="#fff" font-size="18" font-weight="900" font-family="Arial,'Microsoft YaHei'">下载</text>
  <rect x="880" y="18" width="130" height="36" rx="8" fill="#2b2b2b" stroke="#fff"/><text x="945" y="43" text-anchor="middle" fill="#fff" font-size="17" font-family="Arial,'Microsoft YaHei'">简体中文</text>
  <circle cx="1042" cy="36" r="24" fill="#f2c85a"/><text x="1080" y="33" fill="#fff" font-size="18" font-weight="900" font-family="Arial,'Microsoft YaHei'">玩家昵称</text><text x="1080" y="55" fill="#ddd" font-size="13" font-family="Arial">UID 已隐藏</text>
  <rect x="0" y="72" width="1200" height="488" fill="url(#gold)"/>
  <rect x="0" y="72" width="1200" height="488" fill="url(#blue)" opacity=".16"/>
  <circle cx="900" cy="280" r="160" fill="#fff" opacity=".1"/>
  <text x="620" y="300" text-anchor="middle" fill="#ffe7a2" font-size="72" font-weight="900" font-family="Arial,'Microsoft YaHei'">官网福利入口</text>
  <rect x="24" y="94" width="240" height="360" rx="4" fill="#fff" filter="url(#shadow)"/>
  <polygon points="36,94 60,76 84,94" fill="#fff"/>
  <g font-family="Arial,'Microsoft YaHei'" font-weight="900" font-size="26" fill="#111">
    <text x="84" y="138">累充活动</text>
    <text x="84" y="202">七日签到</text>
    <text x="84" y="266">礼包码兑换</text>
    <text x="84" y="330">会员中心</text>
    <text x="84" y="394">积分商城</text>
  </g>
  <g fill="#aaa">
    <circle cx="58" cy="128" r="14"/><rect x="44" y="184" width="28" height="28" rx="4"/><circle cx="58" cy="256" r="12"/><polygon points="44,318 72,318 58,342"/><circle cx="58" cy="384" r="14"/>
  </g>
  <g fill="none" stroke="#ef4b4b" stroke-width="5">
    <ellipse cx="142" cy="194" rx="78" ry="26"/><ellipse cx="142" cy="322" rx="78" ry="26"/><ellipse cx="142" cy="386" rx="78" ry="26"/>
  </g>
  <g font-family="Arial,'Microsoft YaHei'" font-size="18" font-weight="900">
    <rect x="840" y="390" width="250" height="72" rx="8" fill="#fff7e2" stroke="#c99422"/>
    <text x="965" y="422" text-anchor="middle" fill="#20242a">每天重点检查</text>
    <text x="965" y="448" text-anchor="middle" fill="#b4312d">签到 + 会员 + 积分</text>
  </g>
</svg>
