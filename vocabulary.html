","c":"Activity","e":"gear day","p":"/ɡɪr deɪ/","z":"装备日","x":"Spend power cores on gear day when possible."},{"source":"官网补充","c":"Activity","e":"Hero Initiative","p":"/ˈhɪroʊ ɪˈnɪʃətɪv/","z":"英雄行动/英雄主动活动","x":"Hero Initiative rewards hero upgrades and gear spending."},{"source":"官网补充","c":"Activity","e":"Full Preparedness","p":"/fʊl prɪˈperədnəs/","z":"全面备战","x":"Full Preparedness overlaps with many upgrade tasks."},{"source":"官网补充","c":"Activity","e":"Greatest Governor","p":"/ˈɡreɪtɪst ˈɡʌvərnər/","z":"最强执政官/总督活动","x":"Greatest Governor is a staged competition event."},{"source":"官网补充","c":"Activity","e":"Bounty Mission","p":"/ˈbaʊnti ˈmɪʃn/","z":"赏金任务","x":"Bounty Missions give event rewards."},{"source":"官网补充","c":"Activity","e":"Survival Saga","p":"/sərˈvaɪvl ˈsɑːɡə/","z":"生存传奇活动","x":"Survival Saga is an event name."},{"source":"官网补充","c":"Activity","e":"Danger Lurks","p":"/ˈdeɪndʒər lɜːrks/","z":"危机潜伏活动","x":"Danger Lurks is an event name."},{"source":"官网补充","c":"Activity","e":"State Migration","p":"/steɪt maɪˈɡreɪʃn/","z":"州/区服迁移","x":"State Migration is a server movement event."},{"source":"官网补充","c":"Activity","e":"plunder cap","p":"/ˈplʌndər kæp/","z":"掠夺上限","x":"Plunder cap limits resources taken from attacks."},{"source":"官网补充","c":"Activity","e":"event window","p":"/ɪˈvent ˈwɪndoʊ/","z":"活动窗口期","x":"Spend rare items during the right event window."},{"source":"官网补充","c":"Season","e":"season shop","p":"/ˈsiːzən ʃɑːp/","z":"赛季商店","x":"Season shop items reset by season."},{"source":"官网补充","c":"Season","e":"season reset","p":"/ˈsiːzən ˌriːˈset/","z":"赛季重置","x":"Season reset changes rankings and rewards."},{"source":"官网补充","c":"Season","e":"Season 1","p":"/ˈsiːzən wʌn/","z":"第一赛季","x":"Season 1 introduces early season heroes and events."},{"source":"官网补充","c":"Season","e":"Season 2","p":"/ˈsiːzən tuː/","z":"第二赛季","x":"Season 2 opens later progression systems."},{"source":"官网补充","c":"Season","e":"Season 3","p":"/ˈsiːzən θriː/","z":"第三赛季","x":"Season 3 is a later-stage server season."},{"source":"官网补充","c":"Season","e":"Season 4","p":"/ˈsiːzən fɔːr/","z":"第四赛季","x":"Season 4 guides discuss newer hero priorities."},{"source":"官网补充","c":"Season","e":"seasonal event","p":"/ˈsiːzənl ɪˈvent/","z":"赛季活动","x":"Seasonal events often have special shops and rankings."},{"source":"官网补充","c":"System","e":"redeem code","p":"/rɪˈdiːm koʊd/","z":"兑换码","x":"Redeem codes are entered in the official Gift Center."},{"source":"官网补充","c":"System","e":"gift pack","p":"/ɡɪft pæk/","z":"礼包","x":"Gift packs can contain resources and speedups."},{"source":"官网补充","c":"System","e":"already exchanged","p":"/ɔːlˈredi ɪksˈtʃeɪndʒd/","z":"已经兑换","x":"Already exchanged means the code was used by this UID."},{"source":"官网补充","c":"System","e":"active code","p":"/ˈæktɪv koʊd/","z":"可用兑换码","x":"Active codes can still be redeemed."},{"source":"官网补充","c":"System","e":"inactive code","p":"/ɪnˈæktɪv koʊd/","z":"不可用兑换码","x":"Inactive codes are expired or over the claim limit."}];
    const categories = ["基地建设","科研与成长","礼包与公告","联盟与活动","士兵与战斗","英雄与队伍","指挥短句","装备与载具","资源经济","Activity","Building","Hero","Season","System","Technology","Vehicle","联盟邮件术语"];
    const state = { q: '', cat: 'all', random: false };
    const q = document.getElementById('q');
    const cat = document.getElementById('cat');
    const chips = document.getElementById('chips');
    const content = document.getElementById('content');
    const stats = document.getElementById('stats');
    const randomBtn = document.getElementById('randomBtn');
    categories.forEach(c=>{ const opt=document.createElement('option'); opt.value=c; opt.textContent=c; cat.appendChild(opt); });
    function speak(text){ if(!('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=.82; speechSynthesis.speak(u); }
    function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function filtered(){
      const needle = state.q.trim().toLowerCase();
      let list = words.filter(w => (state.cat==='all'||w.c===state.cat) && (!needle || [w.c,w.e,w.p,w.z,w.x,w.source].join(' ').toLowerCase().includes(needle)));
      if(state.random) list = [...list].sort(()=>Math.random()-.5).slice(0,10);
      return list;
    }
    function renderChips(){
      chips.innerHTML='';
      const all=document.createElement('button'); all.className='chip'+(state.cat==='all'?' active':''); all.textContent='全部'; all.onclick=()=>{state.cat='all';cat.value='all';state.random=false;render();}; chips.appendChild(all);
      categories.forEach(c=>{ const b=document.createElement('button'); b.className='chip'+(state.cat===c?' active':''); b.textContent=c; b.onclick=()=>{state.cat=c;cat.value=c;state.random=false;render();}; chips.appendChild(b); });
    }
    function card(w){ return '<article class="card"><div class="termrow"><div><div class="term">'+esc(w.e)+'</div><div class="ipa">'+esc(w.p)+'</div></div><button class="speak" title="发音" onclick="speak('+JSON.stringify(w.e).replace(/"/g,'&quot;')+')">▶</button></div><div class="zh">'+esc(w.z)+'</div><div class="note">'+esc(w.x)+'</div><div class="tagrow"><span class="tag">'+esc(w.c)+'</span><span class="tag source">'+esc(w.source)+'</span></div></article>'; }
    function render(){
      renderChips();
      const list=filtered();
      stats.textContent='显示 '+list.length+' / '+words.length+' 个词条';
      if(!list.length){ content.innerHTML='<div class="empty">没有找到匹配词条。</div>'; return; }
      const groups = new Map();
      list.forEach(w=>{ if(!groups.has(w.c)) groups.set(w.c,[]); groups.get(w.c).push(w); });
      content.innerHTML = Array.from(groups.entries()).map(([c,arr]) => '<section class="section"><div class="section-head"><h2>'+esc(c)+'</h2><span class="hint">'+arr.length+' 个词条</span></div><div class="grid">'+arr.map(card).join('')+'</div></section>').join('');
    }
    q.addEventListener('input',()=>{state.q=q.value;state.random=false;render();});
    cat.addEventListener('change',()=>{state.cat=cat.value;state.random=false;render();});
    randomBtn.addEventListener('click',()=>{state.random=true;render();});
    render();
  </script>
  <script src="assets/site-nav.js"></script>
