<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Last Z 图片资料库</title>
  <style>
    :root{--paper:#fffdf7;--ink:#20242a;--muted:#6b6257;--line:#e4d8c7;--red:#b4312d;--gold:#c99422}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fbf7ed,#efe4d1);color:var(--ink);font-family:Arial,"Microsoft YaHei",sans-serif;line-height:1.72}.wrap{max-width:1120px;margin:auto;padding:0 20px}.topbar{position:sticky;top:0;z-index:20;background:rgba(255,253,247,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.nav{height:60px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;align-items:center;gap:10px;font-weight:900;text-decoration:none;color:inherit}.brand img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid #111}.links{display:flex;gap:8px;flex-wrap:wrap}.links a,.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border:1px solid var(--line);background:#fffaf0;border-radius:7px;text-decoration:none;font-weight:800;font-size:13px;color:inherit}.hero{padding:48px 0 28px;background:linear-gradient(135deg,#fff9ec,#f5e5c8);border-bottom:1px solid var(--line)}.eyebrow{font-size:13px;font-weight:900;color:var(--red);letter-spacing:.08em;text-transform:uppercase}.hero h1{font-size:38px;margin:10px 0}.lead{font-size:18px;color:#4d453b;max-width:820px}.section{padding:34px 0}.card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:18px}.card h2{margin:0 0 6px}.card p{color:var(--muted)}.card img{width:100%;max-height:560px;object-fit:contain;background:#111;border-radius:8px;border:1px solid var(--line);cursor:zoom-in}.footer{padding:26px 0 42px;color:var(--muted);font-size:13px}.modal{position:fixed;inset:0;background:rgba(12,16,20,.9);display:none;align-items:center;justify-content:center;z-index:60}.modal.open{display:flex}.modal-toolbar{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:62}.modal-toolbar button,.modal-close{border:0;border-radius:7px;background:#fff;color:#111;font-weight:900;padding:9px 12px;cursor:pointer}.modal-close{position:fixed;right:14px;top:14px;z-index:62}.modal-stage{width:100vw;height:100vh;overflow:hidden;cursor:grab;display:flex;align-items:center;justify-content:center}.modal-stage.dragging{cursor:grabbing}.modal img{max-width:none;max-height:none;transform-origin:center center;user-select:none;will-change:transform}@media(max-width:760px){.links{display:none}.hero h1{font-size:30px}.card img{max-height:420px}}
  </style>
  <link rel="stylesheet" href="assets/site-theme.css">
</head>
<body>
  <header class="topbar"><div class="wrap nav"><a class="brand" href="index.html"><img src="assets/achao-avatar.png" alt="阿超chao头像"><span>Last Z 图片资料库</span></a><nav class="links"><a href="index.html">首页</a><a href="technology.html">科技总览</a><a href="duel-vs-prep.html">对决对比</a></nav></div></header>
  <main>
    <section class="hero"><div class="wrap"><div class="eyebrow">Charts</div><h1>核心资料图集中查看</h1><p class="lead">点击图片后可多次放大、滚轮缩放、拖动查看细字。手机上建议横屏查看。</p></div></section>
    <section class="section"><div class="wrap">
      <article class="card" id="tech"><h2>科技解锁条件</h2><p>科研分支很长，适合先用手机版总览理解路线，再回到这张图查前置。</p><img class="zoomable" data-src="assets/technology-unlock.png" src="assets/technology-unlock.png" alt="科技解锁条件"></article>
      <article class="card" id="hq-cn"><h2>总部升级条件中文</h2><p>冲 HQ 前先看建筑前置，避免资源、加速准备好了才发现卡城墙或实验室。</p><img class="zoomable" data-src="assets/hq-upgrade-cn.png" src="assets/hq-upgrade-cn.png" alt="总部升级条件中文"></article>
      <article class="card" id="hq-en"><h2>总部升级条件英文</h2><p>英文版适合和国际盟友沟通，也能辅助英语词库学习。</p><img class="zoomable" data-src="assets/hq-upgrade-en.jpg" src="assets/hq-upgrade-en.jpg" alt="总部升级条件英文"></article>
      <article class="card" id="duel"><h2>联盟对决 VS 全面备战</h2><p>用来判断每周资源、加速、碎片和杀敌日怎么配合。</p><img class="zoomable" data-src="assets/duel-vs-prep.png" src="assets/duel-vs-prep.png" alt="联盟对决 VS 全面备战"></article>
      <article class="card" id="tech-mobile"><h2>科技手机版整理</h2><p>把超长科技页拆成手机更容易看的总览版本。</p><img class="zoomable" data-src="assets/technology-mobile.png" src="assets/technology-mobile.png" alt="科技手机版整理"></article>
    </div></section>
  </main>
  <footer class="footer"><div class="wrap">Last Z 综合攻略站 · 图片资料库</div></footer>
  <div class="modal" id="modal"><button class="modal-close" id="close">关闭</button><div class="modal-toolbar"><button id="zoomIn">放大</button><button id="zoomOut">缩小</button><button id="zoomReset">原始大小</button><button id="fit">适应屏幕</button></div><div class="modal-stage" id="stage"><img id="modalImg" alt="资料图"></div></div>
  <script>
    const modal=document.getElementById('modal'),img=document.getElementById('modalImg'),stage=document.getElementById('stage');let scale=1,x=0,y=0,drag=false,sx=0,sy=0;
    function apply(){img.style.transform='translate('+x+'px,'+y+'px) scale('+scale+')'}function openImg(src){img.src=src;scale=1;x=0;y=0;modal.classList.add('open');apply()}function closeModal(){modal.classList.remove('open')}
    document.querySelectorAll('.zoomable').forEach(b=>b.addEventListener('click',()=>openImg(b.dataset.src)));document.getElementById('close').onclick=closeModal;document.getElementById('zoomIn').onclick=()=>{scale=Math.min(scale*1.35,16);apply()};document.getElementById('zoomOut').onclick=()=>{scale=Math.max(scale/1.35,.2);apply()};document.getElementById('zoomReset').onclick=()=>{scale=1;x=0;y=0;apply()};document.getElementById('fit').onclick=()=>{scale=.75;x=0;y=0;apply()};stage.addEventListener('wheel',e=>{e.preventDefault();scale=e.deltaY<0?Math.min(scale*1.2,16):Math.max(scale/1.2,.2);apply()},{passive:false});stage.addEventListener('mousedown',e=>{drag=true;sx=e.clientX-x;sy=e.clientY-y;stage.classList.add('dragging')});window.addEventListener('mousemove',e=>{if(!drag)return;x=e.clientX-sx;y=e.clientY-sy;apply()});window.addEventListener('mouseup',()=>{drag=false;stage.classList.remove('dragging')});window.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='+'){scale=Math.min(scale*1.25,16);apply()}if(e.key==='-'){scale=Math.max(scale/1.25,.2);apply()}if(e.key==='0'){scale=1;x=0;y=0;apply()}});
  </script>
</body>
</html>
